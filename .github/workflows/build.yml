name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      working-directory: AndroidApp
      run: gradle assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: SmartVideoDownloader-APK
        path: AndroidApp/app/build/outputs/apk/release/app-release-unsigned.apk
